<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Test</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="map"></div>
    <div id="modal"><span class="close">&times;</span><span id="modalcontent"></span></div>
  <div id="legend">
    <span class="legend-title">Pick up location</span>
    <form id="checkboxes">
        <fieldset>
            <div>
                <input type="checkbox" id="bundle" name="bundle" value="bundleDrop" checked>
                <label for="bundle"><span id="bundleCheckmark"></span>Inside business</label><br>
                <input type="checkbox" id="modular" name="modular" value="modular" checked>
                <label for="modular"><span id="modularCheckmark"></span>Multi-paper rack</label><br>
                <input type="checkbox" id="box" name="box" value="orangeBox" checked>
                <label for="box"><span id="boxCheckmark"></span>Alligator box</label><br>
            </div>
        </fieldset>   
    </form>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
